name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: All Languages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── TypeScript ────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run test:run
      - run: npm run build

      # ── Go ────────────────────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test -short ./rpc/
        working-directory: generated/go

      # ── Python ────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest test_rpc test_feeds -v
        working-directory: generated/python

      # ── Rust ──────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: generated/rust
