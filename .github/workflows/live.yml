name: Live RPC Tests

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]

jobs:
  live:
    name: Live RPC Integration
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # ── TypeScript live tests ───────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:live
        timeout-minutes: 2

      # ── Go live tests ───────────────────────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test -v -timeout 60s -run TestLive ./rpc/
        working-directory: generated/go
        timeout-minutes: 2

      # ── Python live tests ───────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m unittest test_live -v
        working-directory: generated/python
        timeout-minutes: 2

      # ── Rust live tests ─────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test live -- --ignored
        working-directory: generated/rust
        timeout-minutes: 2
